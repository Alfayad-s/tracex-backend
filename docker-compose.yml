# Use .env for DATABASE_URL, DIRECT_URL, JWT_SECRET (never commit .env).
# For local Postgres: set DATABASE_URL=postgresql://postgres:tracexdev@postgres:5432/tracex and DIRECT_URL same.
services:
  postgres:
    image: postgres:16-alpine
    container_name: tracex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tracexdev
      POSTGRES_DB: tracex
    ports:
      - "5432:5432"
    volumes:
      - tracex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracex"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tracex-app
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tracex_pgdata:
